worker_processes auto;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  # Deliberately excludes IP, cookies, user-agent and referrer.
  log_format vita_minimal '$time_iso8601\t$request_method\t$uri\t$status';
  access_log /var/log/nginx/vita_minimal.log vita_minimal;
  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
  }
}
